"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$os\
$directory\
$git_branch\
$git_commit\
$git_status\
$git_state\
$c\
$dart\
$nodejs\
$kotlin\
$python\
$rust\
$line_break\
$character"""

right_format = "$memory_usage$time"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = ' [$user]($style) '

[directory]
style = "bold cyan"
read_only = " ≤░Ν╛"
home_symbol = "~"
format = ' [$path]($style) '
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "
"github" = "≤░▓Μ "


[character]
success_symbol = '[έηε](bold green)'
error_symbol = '[έηε](bold red)'
vimcmd_symbol = '[ΎΡ┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[ΎΡ┤](bold fg:color_purple)'
vimcmd_replace_symbol = '[ΎΡ┤](bold fg:color_purple)'
vimcmd_visual_symbol = '[ΎΡ┤](bold fg:color_yellow)'

[git_branch]
format = " [$symbol$branch]($style)"
style = 'green'
symbol = "ΎΕΥ ΎΡα "

[git_commit]
commit_hash_length = 6
disabled = false
tag_disabled = false
tag_symbol = ' ΎΡΤ '
format = ' [\($tag_symbol$hash$tag\)]($style)'

[git_state]
disabled = false

[git_status]
format = " ([$ahead_behind$staged$modified$untracked$renamed$deleted$stashed$conflicted]($style))"
ahead = "[έΘκ$count](green) "
behind = "[έΘμ$count](red) "
conflicted = "[~$count](red) "
deleted = "[≤░ππ$count](red) "
diverged = "[έΘκ$ahead_count](green) [έΘμ$behind_count](red) "
modified = "[έΩΠ$count](bright-green) "
renamed = "[έΩΟ$count](bright-blue) "
staged = "[+$count](green) "
stashed = "[έΩΙ$count](green) "
untracked = "[έΩΝ$count](bright-red) "

[c]
format = ' [$symbol($version(-$name))]($style) '
symbol = "Όαη "

[cmake]
format = ' [$symbol($version)]($style) '
symbol = "ΌηΦ "

[dart]
format = ' [$symbol($version)]($style) '
symbol = "Όηα "

[docker_context]
format = ' [$symbol$context]($style) '
symbol = "ΎΝΙ "

[golang]
format = ' $symbol($version)]($style) '
symbol = "Όαπ "

[hg_branch]
symbol = "ΎΡα "

[hostname]
ssh_symbol = "ΌυΒ "

[lua]
format = ' [$symbol($version)]($style) '
symbol = "Όαι "

[memory_usage]
format = ' [$symbol(#000000)${ram}]($style) '
symbol = "≤░Ξδ "
disabled = false
threshold = 40

[nodejs]
format = ' [$symbol($version)]($style) '
symbol = '≤░Οβ '

[time]
disabled = false
format = ' [[ΎΡ║ $time](fg:crust bg:lavender)]($style) '

[os]
format = ' [$symbol]($style)'
disabled = false

[os.symbols]
Arch = "ΎΝΔ "
Debian = "ΎΝΗ "
Linux = "ΎΝγ "
Macos = "ΎΝΓ "
Windows = "≤░Ξ▓ "
Raspbian = 'Ό╜ε '

[package]
symbol = "≤░ΠΩ "

[python]
format = ' [${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
symbol = "ΌΙ╡ "

[rust]
format = '[$symbol($version )]($style) '
symbol = "≤▒αΩ "

[status]
symbol = "ΎΣπ "
